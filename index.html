<script>
let tempo = 30; // tempo em segundos

function atualizarContador() {
  const contador = document.getElementById("contador");
  contador.innerText = "Atualizando em: " + tempo + "s";

  tempo--;

  if (tempo < 0) {
    atualizarDados();
    tempo = 30; // reinicia o contador
  }
}

function atualizarDados() {
  fetch('dados.json?cache=' + new Date().getTime())
    .then(res => res.json())
    .then(data => {
      document.getElementById('status').innerText = data.status;
    })
    .catch(() => {
      document.getElementById('status').innerText = "Erro ao atualizar";
    });
}

// roda a cada 1 segundo
setInterval(atualizarContador, 1000);

// roda uma vez ao iniciar
atualizarDados();
</script>
<style>
#contador {
  font-size: 18px;
  font-weight: bold;
  color: #333;
  margin-bottom: 10px;
}

#status {
  font-size: 22px;
  color: green;
}
</style>
